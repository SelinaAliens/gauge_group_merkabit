kcp_version: "0.14"
project: "gauge_group_merkabit"
description: >
  Paper 13 of the Merkabit series: "The Standard Model Gauge Group from PSL(2,7):
  SU(3)×SU(2)×U(1) as Representation Theory of the Three-Stratum Decomposition of
  GL(3,F_2)". Derives the full Standard Model gauge group from the 168-element group
  PSL(2,7) = GL(3,F2) via three-stratum decomposition into B31 (binary sector, 31
  elements), T75 (ternary sector, 75 elements), and Z62 (weak force stratum, 62
  elements). Establishes SU(3), SU(2), and U(1) as representation theory of these
  strata and recovers gauge boson mass ratios, electroweak mixing, and three-generation
  structure from first principles.
version: "1.0"
created: "2026-04-06"
maintainer: "Selina Stenberg"

