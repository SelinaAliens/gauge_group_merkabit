    audience: [human]
    validated: "2026-04-06"
    hints:
      load_strategy: eager
      token_estimate: 400
      priority: critical
    triggers: [PSL(2,7), GL(3,F2), Standard Model, gauge group, SU(3), SU(2), U(1), three-stratum, B31, T75, Z62, Merkabit, Paper 13]

